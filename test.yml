---
# exercises all 4 combinations of vault_type x vault_scope.
# each scenario is its own play so verification runs immediately after its
# role invocation, before a later scenario sharing the same link_dir
# overwrites the vault symlink.
#
# vault_version is pinned explicitly to match defaults/main.yml's current
# default (2.0.3) - bump both together, see CLAUDE.md Upgrades.

- name: vault community / system scope (role defaults, no overrides)
  hosts: localhost
  roles:
    - role: '{{ playbook_dir }}'
  tasks:
    - include_tasks: tests/verify.yml
      vars:
        verify_type: community
        verify_scope: system
        verify_version: '2.0.3'

- name: vault community / local scope
  hosts: localhost
  roles:
    - role: '{{ playbook_dir }}'
      vars:
        vault_version: '2.0.3'
        vault_type: community
        vault_scope: local
  tasks:
    - include_tasks: tests/verify.yml
      vars:
        verify_type: community
        verify_scope: local
        verify_version: '2.0.3'

- name: vault enterprise / system scope
  hosts: localhost
  roles:
    - role: '{{ playbook_dir }}'
      vars:
        vault_version: '2.0.3'
        vault_type: enterprise
        vault_scope: system
  tasks:
    - include_tasks: tests/verify.yml
      vars:
        verify_type: enterprise
        verify_scope: system
        verify_version: '2.0.3'

- name: vault enterprise / local scope
  hosts: localhost
  roles:
    - role: '{{ playbook_dir }}'
      vars:
        vault_version: '2.0.3'
        vault_type: enterprise
        vault_scope: local
  tasks:
    - include_tasks: tests/verify.yml
      vars:
        verify_type: enterprise
        verify_scope: local
        verify_version: '2.0.3'
